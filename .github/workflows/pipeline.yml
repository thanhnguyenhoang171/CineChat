name: CineChat CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  REGISTRY: ghcr.io

jobs:
  # ==========================================
  # JOB 1: KIỂM TRA CHẤT LƯỢNG CODE & BUILD
  # ==========================================
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint Code
        run: pnpm turbo lint

      - name: Type Check
        run: pnpm turbo type-check

      - name: Run Tests
        run: pnpm turbo test

      - name: Build All Apps
        run: pnpm turbo build

  # ==========================================
  # JOB 2: BUILD DOCKER & PUSH LÊN GHCR
  # ==========================================
  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            dockerfile: ./apps/backend/Dockerfile
            image: ghcr.io/${{ github.repository }}/backend
          - name: admin-console
            dockerfile: ./apps/admin-console/Dockerfile
            image: ghcr.io/${{ github.repository }}/admin-console
          - name: user-console
            dockerfile: ./apps/user-console/Dockerfile
            image: ghcr.io/${{ github.repository }}/user-console

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ==========================================
  # JOB 3: DEPLOY TRỰC TIẾP VỀ LAPTOP ASUS
  # ==========================================
  deploy-to-laptop:
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cloudflared
        run: |
          curl -L --output cloudflared.deb https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Deploy via SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          # 1. Thiết lập thư mục SSH và lưu Private Key
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Tạo file config SSH để ép dùng Cloudflared làm Proxy
          cat <<EOF > ~/.ssh/config
          Host asus-server
              HostName $SERVER_HOST
              User $SERVER_USER
              IdentityFile ~/.ssh/id_rsa
              ProxyCommand /usr/local/bin/cloudflared access ssh --hostname %h
              StrictHostKeyChecking no
          EOF

            s# 3. Chạy lệnh deploy từ xa qua SSH
          ssh asus-server << 'ENDSSH'
            # Di chuyển vào đúng thư mục dự án trên máy Asus
            cd ~/CineChat
            
            # Đăng nhập vào GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 1. Kéo các Image mới nhất của backend, admin-console, user-console về
            docker compose pull
            
            # 2. Ép buộc tạo lại Container từ Image mới
            # --force-recreate: Quan trọng để cập nhật code mới kể cả khi file compose không đổi
            docker compose up -d --force-recreate --remove-orphans
            
            # 3. Dọn dẹp các Image cũ bị gắn nhãn <none> (dangling images)
            # Điều này cực kỳ quan trọng để con Ultra 9 không bị đầy ổ cứng sau nhiều lần deploy
            docker image prune -f
          ENDSSH
