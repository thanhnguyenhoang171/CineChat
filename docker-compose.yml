version: '3.8'

services:
  # Backend Service (NestJS)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: cinechat_backend
    user: root
    ports:
      - '4002:3001'
    env_file:
      - apps/backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - cinechat-network

  # Admin Console Service (Vite + React)
  admin-console:
    build:
      context: .
      dockerfile: apps/admin-console/Dockerfile
      args:
        - VITE_API_URL=https://api-cinechat.thannguyenserver.io.vn/api
    container_name: cinechat_admin_console
    user: root
    ports:
      - '4001:3000'
    env_file:
      - apps/admin-console/.env
    environment:
      - PORT=3000
    depends_on:
      - backend
    networks:
      - cinechat-network

  # User Console Service (Next.js)
  user-console:
    build:
      context: .
      dockerfile: apps/user-console/Dockerfile
    container_name: cinechat_user_console
    user: root
    ports:
      - '4000:3000'
    env_file:
      - apps/user-console/.env
    environment:
      - PORT=3000
    depends_on:
      - backend
    networks:
      - cinechat-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: cinechat_redis
    ports:
      - '6380:6379'
    networks:
      - cinechat-network

networks:
  cinechat-network:
    driver: bridge
