version: '3.8'

services:
  # Backend Service (NestJS)
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: cinechat_backend
    user: root # Xử lý lỗi quyền hạn pnpm/mkdir
    ports:
      - "4002:3001"
    env_file:
      - apps/backend/.env # Bắt buộc load từ file này
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
    depends_on:
      - redis
    networks:
      - cinechat-network

  # Admin Console Service (React Router SSR)
  admin-console:
    build:
      context: .
      dockerfile: apps/admin-console/Dockerfile
    container_name: cinechat_admin_console
    user: root # Cực kỳ quan trọng để sửa lỗi EACCES
    ports:
      - "4001:3000"
    env_file:
      - apps/admin-console/.env # Bắt buộc load từ file này
    environment:
      - PORT=3000
    depends_on:
      - backend
    networks:
      - cinechat-network

  # User Console Service (Next.js)
  user-console:
    build:
      context: .
      dockerfile: apps/user-console/Dockerfile
    container_name: cinechat_user_console
    user: root # Xử lý lỗi pnpm
    ports:
      - "4000:3000"
    env_file:
      - apps/user-console/.env # Bắt buộc load từ file này
    environment:
      - PORT=3000
    depends_on:
      - backend
    networks:
      - cinechat-network

  # Redis Service
  redis:
    image: redis:7-alpine
    container_name: cinechat_redis
    ports:
      - "6380:6379"
    networks:
      - cinechat-network

networks:
  cinechat-network:
    driver: bridge